name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 12:00 UTC — well inside the 7-day inactivity window
    - cron: "0 12 */3 * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -s -o /dev/null -w "Supabase responded: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
